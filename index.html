<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agencia JM Elite - Sala</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: #07111f;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* PANTALLA PRINCIPAL */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(circle at top, #12345c 0%, #07111f 55%, #030812 100%);
}

/* CABECERA PEQUEÑA */
.header {
  height: 62px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(3, 8, 18, 0.88);
  border-bottom: 1px solid rgba(255, 215, 80, 0.25);
  position: relative;
  z-index: 20;
}

.logoBox {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logoCircle {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f7d774, #b98725);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #07111f;
  font-weight: bold;
  font-size: 15px;
  box-shadow: 0 0 12px rgba(255, 215, 80, 0.45);
}

.headerText h1 {
  font-size: 15px;
  color: #f7d774;
  line-height: 1.1;
}

.headerText p {
  font-size: 10px;
  color: #c8d6f0;
}

/* BOTÓN TRES PUNTOS */
.menuBtn {
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: #f7d774;
  font-size: 24px;
  cursor: pointer;
}

/* MENÚ DESPLEGABLE */
.dropdown {
  position: absolute;
  top: 58px;
  right: 10px;
  width: 210px;
  background: rgba(7, 17, 31, 0.98);
  border: 1px solid rgba(255, 215, 80, 0.28);
  border-radius: 16px;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.45);
  z-index: 50;
}

.dropdown.active {
  display: flex;
}

.dropdown button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.07);
  color: white;
  text-align: left;
  font-size: 14px;
  cursor: pointer;
}

.dropdown button:hover {
  background: rgba(247, 215, 116, 0.16);
}

/* SALA GRANDE */
.room {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.roomHero {
  flex: 1;
  min-height: calc(100vh - 150px);
  border-radius: 24px;
  background:
    linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.58)),
    url("https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=900&q=80");
  background-size: cover;
  background-position: center;
  border: 1px solid rgba(255, 215, 80, 0.22);
  box-shadow: inset 0 -80px 90px rgba(0,0,0,0.55);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.roomInfo {
  width: 100%;
  padding: 18px;
}

.liveBadge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: #e83252;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 8px;
}

.roomInfo h2 {
  font-size: 24px;
  color: #ffffff;
  margin-bottom: 5px;
}

.roomInfo p {
  font-size: 14px;
  color: #d9e5ff;
  max-width: 95%;
}

/* BOTÓN PRINCIPAL */
.enterBtn {
  margin-top: 14px;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 18px;
  background: linear-gradient(135deg, #f7d774, #b98725);
  color: #07111f;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(247, 215, 116, 0.28);
}

/* BARRA INFERIOR */
.bottomBar {
  height: 64px;
  padding: 8px 10px;
  background: rgba(3, 8, 18, 0.95);
  border-top: 1px solid rgba(255, 215, 80, 0.22);
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.bottomBar button {
  border: none;
  background: transparent;
  color: #c8d6f0;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
}

.bottomBar span {
  font-size: 20px;
}

.bottomBar button.active {
  color: #f7d774;
}

/* MÓVIL PEQUEÑO */
@media (max-width: 380px) {
  .headerText h1 {
    font-size: 13px;
  }

  .headerText p {
    font-size: 9px;
  }

  .roomInfo h2 {
    font-size: 21px;
  }

  .roomInfo p {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="app">

  <header class="header">
    <div class="logoBox">
      <div class="logoCircle">JM</div>
      <div class="headerText">
        <h1>Agencia JM Elite</h1>
        <p>Sala oficial en directo</p>
      </div>
    </div>

    <button class="menuBtn" onclick="toggleMenu()">⋮</button>

    <div class="dropdown" id="dropdownMenu">
      <button onclick="goTo('perfil')">👤 Mi perfil</button>
      <button onclick="goTo('emisoras')">🎙️ Mis emisoras</button>
      <button onclick="goTo('academia')">🎓 Academia</button>
      <button onclick="goTo('pagos')">💰 Pagos</button>
      <button onclick="goTo('ranking')">🏆 Ranking</button>
      <button onclick="goTo('soporte')">🛟 Soporte</button>
    </div>
  </header>

  <main class="room">
    <section class="roomHero">
      <div class="roomInfo">
        <div class="liveBadge">● EN VIVO</div>
        <h2>Sala JM Elite</h2>
        <p>Conecta con la agencia, revisa avisos importantes y entra a la sala principal desde un solo lugar.</p>
        <button class="enterBtn" onclick="enterRoom()">Entrar a la sala</button>
      </div>
    </section>
  </main>

  <nav class="bottomBar">
    <button class="active" onclick="goTo('inicio')">
      <span>🏠</span>
      Inicio
    </button>
    <button onclick="goTo('chat')">
      <span>💬</span>
      Chat
    </button>
    <button onclick="goTo('avisos')">
      <span>📢</span>
      Avisos
    </button>
    <button onclick="goTo('perfil')">
      <span>👤</span>
      Perfil
    </button>
  </nav>

</div>

<script>
function toggleMenu() {
  const menu = document.getElementById("dropdownMenu");
  menu.classList.toggle("active");
}

function goTo(section) {
  alert("Abriendo: " + section);
  document.getElementById("dropdownMenu").classList.remove("active");
}

function enterRoom() {
  alert("Entrando a la Sala JM Elite");
}
</script>

</body>
</html>
